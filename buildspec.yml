version: 0.2

phases:
  pre_build:
    commands:
      - REGISTRY=$(echo $ECR_REPO_URL | cut -d/ -f1)
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $REGISTRY
      - IMAGE_TAG=$(echo ${RELEASE_TAG:-$CODEBUILD_RESOLVED_SOURCE_VERSION} | tr '/' '-')

  build:
    commands:
      - docker build --platform linux/amd64 -t $ECR_REPO_URL:$IMAGE_TAG .

  post_build:
    commands:
      - docker push $ECR_REPO_URL:$IMAGE_TAG
      - |
        # Push mutable 'main' tag only when building from main branch.
        # deploy.yml uses this tag to promote the latest main image without a rebuild.
        BRANCH_VALUE="${BRANCH:-main}"
        if [ "$BRANCH_VALUE" = "main" ]; then
          docker tag $ECR_REPO_URL:$IMAGE_TAG $ECR_REPO_URL:main
          docker push $ECR_REPO_URL:main
        fi
