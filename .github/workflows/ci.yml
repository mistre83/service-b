name: CI

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  # Detects whether push includes code changes or only CHANGELOG/version.txt
  check-path:
    if: github.ref_type == 'branch'
    runs-on: ubuntu-latest
    outputs:
      is_code_push: ${{ steps.check.outputs.is_code_push }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - id: check
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          if [ -z "$CHANGED" ] || echo "$CHANGED" | grep -qvE '^(CHANGELOG\.md|version\.txt)$'; then
            echo "is_code_push=true" >> $GITHUB_OUTPUT
          else
            echo "is_code_push=false" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check-path
    if: needs.check-path.outputs.is_code_push == 'true'
    uses: mistre83/shared-workflows/.github/workflows/build.yml@main
    secrets: inherit

  release-please:
    needs: [check-path, build]
    if: |
      always() &&
      github.ref_type == 'branch' &&
      needs.check-path.result == 'success' &&
      (needs.build.result == 'success' || needs.build.result == 'skipped')
    uses: mistre83/shared-workflows/.github/workflows/release-please.yml@main
    secrets: inherit

  deploy-prod:
    if: github.ref_type == 'tag' && startsWith(github.ref, 'refs/tags/v')
    uses: mistre83/shared-workflows/.github/workflows/deploy-prod.yml@main
    secrets: inherit
